<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CIERREX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" id="navbarLogoText" href="#"><b>CIERREX</b></a>
            <img id="navbarLogoImg" src="" alt="Logo" class="d-none" style="max-height: 40px;">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="cierrex.html">Cierres</a>
                    </li>
                    <li class="nav-item nav-middle">
                        <a class="nav-link" href="historial.html">Historial</a>
                    </li>
                    <li class="nav-item nav-middle">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item nav-admin">
                        <a class="nav-link" href="usuarios.html">Usuarios</a>
                    </li>
                    <li class="nav-item nav-admin">
                        <a class="nav-link" href="configuracion.html">Configuración</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mt-4 mb-4 text-center display-4">Dashboard</h1>
        
        <div class="card card-dashboard mb-4">
            <div class="card-body">
                <h5 class="card-title text-center h4">Cierre Total del Día</h5>
                <div id="dailyCierre" class="text-center mb-3">
                    <p id="dailyTotalUsd" class="fs-4 fw-bold text-success">Total USD: $0.00</p>
                    <p id="dailyTotalVes" class="fs-4 fw-bold text-primary">Total VES: Bs 0.00</p>
                    <div id="dailyDetails" class="fs-6 mt-3 row"></div>
                </div>
            </div>
        </div>

        <div class="card card-dashboard mb-4">
            <div class="card-body">
                <h5 class="card-title text-center h4">Filtros Estadísticos</h5>
                <form id="filterForm" class="col-12 col-md-8 mx-auto">
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label for="startDate" class="form-label">Fecha Inicio</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="col-md-5 mb-3">
                            <label for="endDate" class="form-label">Fecha Fin</label>
                            <input type="date" class="form-control" id="endDate">
                        </div>
                        <div class="col-md-2 mb-3 align-self-end">
                            <button type="button" class="btn btn-primary d-block w-100" onclick="fetchChartData()">Filtrar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card card-dashboard mb-4">
            <div class="card-body">
                <h5 class="card-title text-center h4">Gráfico de Cierres Diarios</h5>
                <canvas id="cierresChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
