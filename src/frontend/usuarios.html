<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - CIERREX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" id="navbarLogoText" href="#"><b>CIERREX</b></a>
            <img id="navbarLogoImg" src="" alt="Logo" class="d-none" style="max-height: 40px;">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="cierrex.html">Cierres</a>
                    </li>
                    <li class="nav-item nav-middle">
                        <a class="nav-link" href="historial.html">Historial</a>
                    </li>
                    <li class="nav-item nav-middle">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item nav-admin">
                        <a class="nav-link active" href="usuarios.html">Usuarios</a>
                    </li>
                    <li class="nav-item nav-admin">
                        <a class="nav-link" href="configuracion.html">Configuración</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mt-4 mb-4 text-center display-4">Gestión de Usuarios</h1>
        
        <div class="card card-form mb-4">
            <div class="card-body">
                <h5 class="card-title text-center h4">Agregar Empleado</h5>
                <div id="userAlert" class="alert" role="alert"></div>
                
                <form id="userForm" class="col-12 col-md-10 mx-auto mt-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="role" class="form-label">Nivel de Acceso</label>
                            <select class="form-select" id="role">
                                <option value="1">Cajero (Solo Registros)</option>
                                <option value="2">Administrativo (Cierres e Historial)</option>
                                <option value="3">Corporativo (Acceso Total)</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-primary d-block mx-auto mt-3 w-50" onclick="createUser()">Crear Usuario</button>
                </form>
            </div>
        </div>

        <div class="card card-form">
            <div class="card-body">
                <h5 class="card-title text-center h4">Empleados Registrados</h5>
                <div class="table-responsive mt-3">
                    <table class="table table-striped text-center">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Rol / Nivel</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Editar Usuario -->
    <div class="modal fade" id="userEditModal" tabindex="-1" aria-labelledby="userEditModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userEditModalLabel">Editar Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editUserForm">
                        <input type="hidden" id="editUserId">
                        <div class="mb-3">
                            <label for="editName" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editEmail" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="editEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="editPassword" class="form-label">Nueva Contraseña (Opcional)</label>
                            <input type="password" class="form-control" id="editPassword" placeholder="Dejar en blanco para no cambiar">
                        </div>
                        <div class="mb-3">
                            <label for="editRole" class="form-label">Nivel de Acceso</label>
                            <select class="form-select" id="editRole">
                                <option value="1">Cajero (Solo Registros)</option>
                                <option value="2">Administrativo (Cierres e Historial)</option>
                                <option value="3">Corporativo (Acceso Total)</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="updateUser()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/usuarios.js"></script>
</body>
</html>
