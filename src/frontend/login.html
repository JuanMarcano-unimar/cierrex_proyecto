<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - CIERREX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-4 mb-4 text-center display-4" id="loginBrandText"><b>CIERREX</b></h1>
        <div class="text-center mt-4 mb-4">
            <img id="loginBrandLogo" src="" class="d-none" style="object-fit: contain; max-height: 120px;" alt="Logo Empresarial">
        </div>
        <div class="card card-login mb-4">
            <div class="card-body">
                <h5 class="card-title text-center h4">Accede a CIERREX</h5>
                <div id="loginAlert" class="alert" role="alert"></div>
                <form id="loginForm" class="col-12 col-md-10 mx-auto">
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="button" class="btn btn-primary d-block mx-auto w-100" onclick="login()">Iniciar Sesión</button>
                    <!-- <p class="text-center mt-3">
                        <a href="recuperar.html" class="text-link">¿Olvidaste tu contraseña?</a>
                    </p> -->
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');

            try {
                // Hacemos el fetch dinámicamente usando la variable BASE_URL desde app.js
                const BACKEND_PORT = localStorage.getItem('PORT') || 3000;
                const BASE_URL = `http://localhost:${BACKEND_PORT}/api`;

                const response = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = 'Inicio de sesión exitoso.';
                    alertBox.style.display = 'block';
                    
                    // Solo guardamos la sesion temporal
                    localStorage.setItem('currentUser', JSON.stringify(data));
                    
                    setTimeout(() => {
                        window.location.href = 'cierrex.html';
                    }, 1000);
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = data.error || 'Correo o contraseña incorrectos.';
                    alertBox.style.display = 'block';
                }
            } catch (error) {
                console.error('Error in login:', error);
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Error de conexión con el servidor.';
                alertBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
